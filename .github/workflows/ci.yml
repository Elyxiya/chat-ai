name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - 'db/**'
      - 'docker/**'
      - 'pnpm-*.yaml'
      - '.dockerignore'
      - '.env.example'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - 'db/**'
      - 'docker/**'
      - 'pnpm-*.yaml'
      - '.dockerignore'
      - '.env.example'

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: docker.icu.cn/pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: minichat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: docker.icu.cn/library/redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm --filter ai-native-chat-api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/minichat_test

      - name: Lint
        run: pnpm --filter ai-native-chat-api lint

      - name: Run tests with coverage
        run: pnpm --filter ai-native-chat-api test -- --maxWorkers=2 --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/minichat_test
          REDIS_HOST: localhost
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMBEDDING_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  lint-and-test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: TypeCheck
        run: pnpm --filter ai-native-chat-web typecheck

      - name: Test
        run: pnpm --filter ai-native-chat-web test

      - name: Lint
        run: pnpm --filter ai-native-chat-web lint

      - name: Build
        run: pnpm --filter ai-native-chat-web build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:3000' }}

  coverage-api:
    runs-on: ubuntu-latest
    needs: [lint-and-test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm --filter ai-native-chat-api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/minichat_test
      - run: pnpm --filter ai-native-chat-api test -- --maxWorkers=2 --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/minichat_test
          REDIS_HOST: localhost
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, lint-and-test-web, e2e-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: type=sha,prefix=,enable=true,priority=600
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://minichat:${{ secrets.DB_PASSWORD }}@postgres:5432/minichat
            JWT_SECRET=${{ secrets.JWT_SECRET }}
      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: type=sha,prefix=
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: pnpm --filter ai-native-chat-web test:e2e

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build-push, coverage-api]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy to Staging
        run: |
          echo "::notice::Deploying to staging environment"
          echo "Deployment would go here — requires SSH/host configuration"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'release'
    environment: production
    steps:
      - name: Deploy to Production
        run: |
          echo "::notice::Deploying to production (triggered by release)"
          echo "Production deployment would go here"
