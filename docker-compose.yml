# ============================================================
# AI-Native Chat System - Docker Compose
# ============================================================
# Usage: cp .env.example .env && docker-compose up -d
# ============================================================

services:
  # ── Database ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: minichat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minichat
      POSTGRES_USER: minichat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-minichat_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minichat -d minichat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: library/redis:7-alpine
    container_name: minichat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: minichat-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE:-9001}:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── API Server ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: minichat-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://minichat:${DB_PASSWORD:-minichat_dev_password}@postgres:5432/minichat
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL_V3: deepseek-chat
      DEEPSEEK_MODEL_R1: deepseek-reasoner
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: minichat-files
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 100
      AI_DAILY_LIMIT: 100
      AI_STREAM_TIMEOUT: 120000
      AI_THINKING_ENABLED: ${AI_THINKING_ENABLED:-false}
      AI_REASONING_EFFORT: ${AI_REASONING_EFFORT:-high}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./apps/api/logs:/app/logs

  # ── Web Frontend ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: minichat-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://api:3000
      VITE_WS_URL: ws://api:3000

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: minichat-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web

  # ── Redis Commander (dev only) ──────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: minichat-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_CMD_PORT:-8081}:8081"
    depends_on:
      - redis
    profiles:
      - dev

  # ── pgAdmin (dev only) ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: minichat-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minichat.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
